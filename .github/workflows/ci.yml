name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: [self-hosted, rpi]   # RPI self-hosted — no GHA minutes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no remote cache on self-hosted: ~/.npm persists locally between runs,
          # and the Post cache-upload step hangs on the RPI's home uplink
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run package
      - run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
